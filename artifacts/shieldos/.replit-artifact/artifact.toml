kind = "web"
previewPath = "/"
title = "ShieldOS Dashboard"
version = "1.0.0"
id = "artifacts/shieldos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19659

[services.development]
run = "pnpm --filter @workspace/shieldos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shieldos", "run", "build" ]
publicDir = "artifacts/shieldos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19659"
BASE_PATH = "/"
