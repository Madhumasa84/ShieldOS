openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ShieldOS Privacy Backend API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: vpn
    description: VPN device management
  - name: blocklist
    description: Domain blocklist management
  - name: threats
    description: Threat intelligence
  - name: dashboard
    description: Dashboard aggregates
  - name: admin
    description: Admin user management
  - name: dns
    description: Real-time DNS query processing and filtering

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /v1/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshBody"
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and invalidate refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshBody"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # VPN
  /v1/vpn/provision:
    post:
      operationId: provisionDevice
      tags: [vpn]
      summary: Provision a new VPN device and generate WireGuard config
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionDeviceBody"
      responses:
        "201":
          description: Device provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceProvisionResponse"

  /v1/vpn/configs:
    get:
      operationId: listDevices
      tags: [vpn]
      summary: List all user devices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceListResponse"

  /v1/vpn/revoke/{deviceId}:
    delete:
      operationId: revokeDevice
      tags: [vpn]
      summary: Revoke a device's VPN access
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/vpn/status:
    get:
      operationId: getVpnStatus
      tags: [vpn]
      summary: Get VPN server status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: VPN status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnStatus"

  # BLOCKLIST
  /v1/blocklist/check:
    post:
      operationId: checkDomain
      tags: [blocklist]
      summary: Check if a domain is blocked (checks both custom and system blocklist)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckDomainBody"
      responses:
        "200":
          description: Domain check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainCheckResponse"

  /v1/blocklist/stats:
    get:
      operationId: getBlocklistStats
      tags: [blocklist]
      summary: Get blocklist stats (custom + system totals, sync info)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Blocklist statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlocklistStats"

  /v1/blocklist/custom:
    get:
      operationId: listCustomBlocklist
      tags: [blocklist]
      summary: List user's custom blocked domains
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [ads, tracking, malware, social, all]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Custom blocklist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlocklistEntriesResponse"
    post:
      operationId: addCustomDomain
      tags: [blocklist]
      summary: Add a domain to user's custom blocklist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDomainBody"
      responses:
        "201":
          description: Domain added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlocklistEntry"

  /v1/blocklist/custom/{domain}:
    delete:
      operationId: removeCustomDomain
      tags: [blocklist]
      summary: Remove a domain from custom blocklist
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/blocklist/system:
    get:
      operationId: listSystemBlocklist
      tags: [blocklist]
      summary: List system-wide blocked domains (from synced blocklists)
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: System blocklist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemBlocklistResponse"

  /v1/blocklist/sync-status:
    get:
      operationId: getSyncStatus
      tags: [blocklist]
      summary: Get the latest blocklist sync status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"

  /v1/blocklist/sync:
    post:
      operationId: triggerSync
      tags: [blocklist]
      summary: Manually trigger a blocklist sync
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sync started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/blocklist/blocked-requests:
    get:
      operationId: listBlockedRequests
      tags: [blocklist]
      summary: List recent blocked requests for the user's devices
      security:
        - bearerAuth: []
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Blocked requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedRequestsResponse"

  # THREATS
  /v1/threats/feed:
    get:
      operationId: getThreatFeed
      tags: [threats]
      summary: Get latest verified threats (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: verified
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Threat feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatFeedResponse"

  /v1/threats/report:
    post:
      operationId: reportThreat
      tags: [threats]
      summary: Submit a community threat report
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportThreatBody"
      responses:
        "201":
          description: Threat reported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatReport"

  /v1/threats/vote/{threatId}:
    post:
      operationId: voteThreat
      tags: [threats]
      summary: Upvote or downvote a threat report
      security:
        - bearerAuth: []
      parameters:
        - name: threatId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteBody"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatReport"

  /v1/threats/stats:
    get:
      operationId: getThreatStats
      tags: [threats]
      summary: Get threat intelligence statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Threat stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreatStats"

  # LOG
  /v1/log/request:
    post:
      operationId: logRequest
      tags: [blocklist]
      summary: Log a DNS request from an Android device, returns blocked status
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogRequestBody"
      responses:
        "200":
          description: Log result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogRequestResponse"

  # STATS
  /v1/stats/dashboard:
    get:
      operationId: getStatsDashboard
      tags: [dashboard]
      summary: Comprehensive live dashboard stats (single call)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Live dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsDashboard"

  # ADMIN
  /v1/admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all users with device count and last login (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"

  /v1/admin/users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Promote or demote a user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleBody"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/admin/users/{userId}/status:
    patch:
      operationId: updateUserStatus
      tags: [admin]
      summary: Activate or deactivate a user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/admin/users/{userId}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [admin]
      summary: Reset a user's password and return a temp password (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"

  # DASHBOARD
  /v1/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall privacy dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /v1/dashboard/blocked-chart:
    get:
      operationId: getBlockedChart
      tags: [dashboard]
      summary: Get blocked requests per hour for last 24h
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Hourly blocked requests chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedChartResponse"

  /v1/dashboard/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [dashboard]
      summary: Get blocked requests by category (pie chart data)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryBreakdownResponse"

  # DNS
  /v1/dns/query:
    post:
      operationId: dnsQuery
      tags: [dns]
      summary: Check a single domain against the blocklist (sub-20ms)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DnsQueryBody"
      responses:
        "200":
          description: DNS query result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsQueryResponse"

  /v1/dns/batch:
    post:
      operationId: dnsBatch
      tags: [dns]
      summary: Check up to 100 domains in one request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DnsBatchBody"
      responses:
        "200":
          description: Batch DNS results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsBatchResponse"

  /v1/dns/stats/{deviceId}:
    get:
      operationId: getDnsStats
      tags: [dns]
      summary: DNS query statistics for a device
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: DNS statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsStatsResponse"

  /v1/dns/allow:
    get:
      operationId: getDnsAllowlist
      tags: [dns]
      summary: Get the user's full allowlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Allowlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsAllowlistResponse"
    post:
      operationId: addDnsAllowlist
      tags: [dns]
      summary: Add a domain to the allowlist (never blocked)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DnsAllowBody"
      responses:
        "201":
          description: Domain added to allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsAllowEntry"

  /v1/dns/allow/{domain}:
    delete:
      operationId: deleteDnsAllowlist
      tags: [dns]
      summary: Remove a domain from the allowlist
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed from allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/dns/cache/flush:
    post:
      operationId: flushDnsCache
      tags: [dns]
      summary: Flush the in-memory DNS result cache (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cache flushed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsCacheFlushResponse"

  /v1/dns/cache/stats:
    get:
      operationId: getDnsCacheStats
      tags: [dns]
      summary: Get DNS cache performance statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cache stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsCacheStatsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # AUTH
    RegisterBody:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        password:
          type: string
          minLength: 8
      required: [username, password]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    RefreshBody:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        role:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [userId, username, role, accessToken, refreshToken]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
        isActive:
          type: boolean
      required: [id, username, role, createdAt, isActive]

    AdminUserItem:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        deviceCount:
          type: integer
      required: [id, username, role, isActive, createdAt, deviceCount]

    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserItem"
      required: [users]

    UpdateUserRoleBody:
      type: object
      properties:
        role:
          type: string
          enum: [admin, user]
      required: [role]

    UpdateUserStatusBody:
      type: object
      properties:
        isActive:
          type: boolean
      required: [isActive]

    ResetPasswordResponse:
      type: object
      properties:
        tempPassword:
          type: string
      required: [tempPassword]

    # VPN
    ProvisionDeviceBody:
      type: object
      properties:
        deviceName:
          type: string
          minLength: 1
          maxLength: 64
      required: [deviceName]

    DeviceProvisionResponse:
      type: object
      properties:
        device:
          $ref: "#/components/schemas/Device"
        configContent:
          type: string
          description: WireGuard .conf file content
      required: [device, configContent]

    Device:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        publicKey:
          type: string
        createdAt:
          type: string
          format: date-time
        isActive:
          type: boolean
        blockedCount:
          type: integer
      required: [id, name, publicKey, createdAt, isActive, blockedCount]

    DeviceListResponse:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/Device"
        total:
          type: integer
      required: [devices, total]

    VpnStatus:
      type: object
      properties:
        activeDevices:
          type: integer
        totalDevices:
          type: integer
        serverUptime:
          type: string
      required: [activeDevices, totalDevices, serverUptime]

    # BLOCKLIST
    CheckDomainBody:
      type: object
      properties:
        domain:
          type: string
      required: [domain]

    DomainCheckResponse:
      type: object
      properties:
        domain:
          type: string
        blocked:
          type: boolean
        category:
          type: string
        source:
          type: string
        addedAt:
          type: string
          nullable: true
      required: [domain, blocked, category, source]

    BlocklistEntry:
      type: object
      properties:
        id:
          type: integer
        domain:
          type: string
        category:
          type: string
        source:
          type: string
        addedAt:
          type: string
          format: date-time
      required: [id, domain, category, source, addedAt]

    BlocklistEntriesResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/BlocklistEntry"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [entries, total, page, limit]

    SystemBlocklistEntry:
      type: object
      properties:
        id:
          type: integer
        domain:
          type: string
        category:
          type: string
        source:
          type: string
        addedAt:
          type: string
          format: date-time
      required: [id, domain, category, source, addedAt]

    SystemBlocklistResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/SystemBlocklistEntry"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [entries, total, page, limit]

    AddDomainBody:
      type: object
      properties:
        domain:
          type: string
        category:
          type: string
          enum: [ads, tracking, malware, social]
          default: tracking
      required: [domain]

    BlocklistStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        systemTotal:
          type: integer
        systemByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        syncStatus:
          type: string
      required: [total, byCategory, systemTotal, systemByCategory, syncStatus]

    SyncStatusResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        totalDomains:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
      required: [id, status, totalDomains, startedAt]

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required: [category, count]

    BlockedRequest:
      type: object
      properties:
        id:
          type: integer
        domain:
          type: string
        category:
          type: string
        timestamp:
          type: string
          format: date-time
        deviceId:
          type: integer
        deviceName:
          type: string
      required: [id, domain, category, timestamp, deviceId, deviceName]

    BlockedRequestsResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/BlockedRequest"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [requests, total, page, limit]

    # THREATS
    ThreatReport:
      type: object
      properties:
        id:
          type: integer
        domain:
          type: string
        category:
          type: string
        description:
          type: string
        votes:
          type: integer
        verified:
          type: boolean
        reportedAt:
          type: string
          format: date-time
        userVote:
          type: integer
          description: "1 for upvote, -1 for downvote, 0 for no vote"
      required: [id, domain, category, description, votes, verified, reportedAt, userVote]

    ThreatFeedResponse:
      type: object
      properties:
        threats:
          type: array
          items:
            $ref: "#/components/schemas/ThreatReport"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [threats, total, page, limit]

    ReportThreatBody:
      type: object
      properties:
        domain:
          type: string
        category:
          type: string
          enum: [malware, phishing, tracking, adware, spyware, ransomware, other]
        description:
          type: string
          maxLength: 500
      required: [domain, category, description]

    VoteBody:
      type: object
      properties:
        vote:
          type: integer
          enum: [1, -1]
      required: [vote]

    ThreatStats:
      type: object
      properties:
        totalReports:
          type: integer
        verifiedThreats:
          type: integer
        pendingReview:
          type: integer
        topCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
      required: [totalReports, verifiedThreats, pendingReview, topCategories]

    # DASHBOARD
    DashboardSummary:
      type: object
      properties:
        trackersBlockedTotal:
          type: integer
        domainsInBlocklist:
          type: integer
        activeDevices:
          type: integer
        threatsDetected:
          type: integer
        blockedLast24h:
          type: integer
        topBlockedDomain:
          type: string
      required:
        [
          trackersBlockedTotal,
          domainsInBlocklist,
          activeDevices,
          threatsDetected,
          blockedLast24h,
          topBlockedDomain,
        ]

    BlockedChartDataPoint:
      type: object
      properties:
        hour:
          type: string
        count:
          type: integer
      required: [hour, count]

    BlockedChartResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BlockedChartDataPoint"
      required: [data]

    CategoryBreakdownItem:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required: [category, count, percentage]

    CategoryBreakdownResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdownItem"
      required: [data]

    # DNS
    DnsQueryBody:
      type: object
      properties:
        domain:
          type: string
        device_id:
          type: string
      required: [domain]

    DnsQueryResponse:
      type: object
      properties:
        blocked:
          type: boolean
        category:
          type: string
        rule:
          type: string
        response_time_ms:
          type: integer
      required: [blocked, category, rule, response_time_ms]

    DnsBatchBody:
      type: object
      properties:
        domains:
          type: array
          items:
            type: string
          maxItems: 100
        device_id:
          type: string
      required: [domains]

    DnsBatchResponse:
      type: object
      properties:
        results:
          type: object
          additionalProperties:
            type: boolean
      required: [results]

    DnsTopBlocked:
      type: object
      properties:
        domain:
          type: string
        count:
          type: integer
      required: [domain, count]

    DnsHourBucket:
      type: object
      properties:
        hour:
          type: integer
        count:
          type: integer
      required: [hour, count]

    DnsStatsResponse:
      type: object
      properties:
        total_queries_today:
          type: integer
        blocked_today:
          type: integer
        block_rate:
          type: string
        top_blocked:
          type: array
          items:
            $ref: "#/components/schemas/DnsTopBlocked"
        queries_by_hour:
          type: array
          items:
            $ref: "#/components/schemas/DnsHourBucket"
        most_recent_block:
          type: string
          nullable: true
      required: [total_queries_today, blocked_today, block_rate, top_blocked, queries_by_hour]

    DnsAllowBody:
      type: object
      properties:
        domain:
          type: string
      required: [domain]

    DnsAllowEntry:
      type: object
      properties:
        id:
          type: integer
        domain:
          type: string
        addedAt:
          type: string
          format: date-time
      required: [id, domain, addedAt]

    DnsAllowlistResponse:
      type: object
      properties:
        allowlist:
          type: array
          items:
            $ref: "#/components/schemas/DnsAllowEntry"
      required: [allowlist]

    DnsCacheFlushResponse:
      type: object
      properties:
        entries_cleared:
          type: integer
      required: [entries_cleared]

    DnsCacheStatsResponse:
      type: object
      properties:
        size:
          type: integer
        hitRate:
          type: string
        missRate:
          type: string
        blocklistSize:
          type: integer
      required: [size, hitRate, missRate, blocklistSize]

    # LOG
    LogRequestBody:
      type: object
      properties:
        device_id:
          type: integer
        domain:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [device_id, domain]

    LogRequestResponse:
      type: object
      properties:
        blocked:
          type: boolean
        category:
          type: string
      required: [blocked, category]

    # STATS
    TopBlockedDomain:
      type: object
      properties:
        domain:
          type: string
        count:
          type: integer
      required: [domain, count]

    StatsDashboardCategoryItem:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required: [category, count, percentage]

    StatsDashboard:
      type: object
      properties:
        trackers_blocked_today:
          type: integer
        trackers_blocked_total:
          type: integer
        domains_in_blocklist:
          type: integer
        active_devices:
          type: integer
        online_devices:
          type: integer
        threats_detected:
          type: integer
        blocked_by_hour:
          type: array
          items:
            $ref: "#/components/schemas/BlockedChartDataPoint"
        blocked_by_category:
          type: array
          items:
            $ref: "#/components/schemas/StatsDashboardCategoryItem"
        top_blocked_domains:
          type: array
          items:
            $ref: "#/components/schemas/TopBlockedDomain"
      required:
        [
          trackers_blocked_today,
          trackers_blocked_total,
          domains_in_blocklist,
          active_devices,
          online_devices,
          threats_detected,
          blocked_by_hour,
          blocked_by_category,
          top_blocked_domains,
        ]
